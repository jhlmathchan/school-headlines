<!doctype html>
<html lang="ko">
<head>

  <meta http-equiv="refresh" content="600">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <title>2026년 5월 28일 헤드라인 모음</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #1a1a1a;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", Dotum, sans-serif; color: #fff; }
    table.screen { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; background: #1a1a1a; }
    td.hdr { height: 1px; padding: 9px 16px; background: #1a1a1a; border-bottom: 7px solid #1a1a1a;
      white-space: nowrap; overflow: hidden; }
    td.hdr h1 { display: inline; margin: 0; font-size: 23px; font-weight: bold; letter-spacing: -1px; color: #fff; }
    td.hdr .kw { float: right; font-size: 17px; color: #b9b9b9; padding-top: 4px; }
    td.hdr .kw b { background: #fff; color: #111; padding: 3px 12px; margin-right: 10px; font-size: 15px; }
    td.cell { width: 50%; height: 50%; background: #fff; border: 7px solid #1a1a1a;
      vertical-align: top; text-align: center; overflow: hidden; }
    td.cell .plabel { background: #fff; border-top: 4px solid #111; border-bottom: 1px solid #e4e4e4;
      text-align: left; padding: 7px 14px; white-space: nowrap; overflow: hidden; }
    td.cell .plabel.p-chosun { border-top-color: #15396b; }
    td.cell .plabel.p-donga  { border-top-color: #0d6e7d; }
    td.cell .plabel.p-hani   { border-top-color: #2e7d46; }
    td.cell .plabel.p-khan   { border-top-color: #b32a3a; }
    td.cell .plabel img { height: 22px; width: auto; max-width: none; max-height: none;
      vertical-align: middle; border: 0; }
    td.cell .plabel .kname { font-size: 20px; font-weight: bold; color: #111;
      vertical-align: middle; margin-left: 8px; letter-spacing: 1px; }
    td.cell .plabel .ptime { font-size: 13px; font-weight: normal; color: #999;
      vertical-align: middle; margin-left: 10px; letter-spacing: 0; }
    td.cell img { max-width: 100%; max-height: 88%; border: 0; }
  </style>
</head>
<body>
  <table class="screen">
    <tr>
      <td class="hdr" colspan="2">

    <tr>
      <td class="cell"><div class="plabel p-chosun"><img src="logos/chosun.png" alt="조선일보"><span class="kname">조선일보</span><span class="ptime" data-p="chosun"></span></div><img alt="조선일보 뉴스스탠드 지면" src="newsstand-captures/clean/chosun.png"></td>
      <td class="cell"><div class="plabel p-donga"><img src="logos/donga.png" alt="동아일보"><span class="ptime" data-p="donga"></span></div><img alt="동아일보 뉴스스탠드 지면" src="newsstand-captures/clean/donga.png"></td>
    </tr>
    <tr>
      <td class="cell"><div class="plabel p-hani"><img src="logos/hani.png" alt="한겨레"><span class="ptime" data-p="hani"></span></div><img alt="한겨레 뉴스스탠드 지면" src="newsstand-captures/clean/hani.png"></td>
      <td class="cell"><div class="plabel p-khan"><img src="logos/khan.png" alt="경향신문"><span class="ptime" data-p="khan"></span></div><img alt="경향신문 뉴스스탠드 지면" src="newsstand-captures/clean/khan.png"></td>
    </tr>
  </table>

</html>
