<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="600">
  <title>2026년 5월 28일 헤드라인 모음</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #6f66a0;
      color: #151515;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .page {
      width: 98%;
      max-width: 1760px;
      margin: 8px auto;
      padding: 8px;
      background: #f7f1e3;
      border: 1px solid #cfc4ad;
    }

    .header {
      border-bottom: 4px double #222;
      padding: 0 0 6px 0;
      margin-bottom: 6px;
      overflow: hidden;
    }

    h1 {
      float: left;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1.1;
      font-weight: bold;
      letter-spacing: 0;
    }

    .sub {
      float: right;
      margin-top: 6px;
      text-align: right;
      font-size: 12px;
      line-height: 1.35;
      color: #3d352c;
    }

    .guide {
      clear: both;
      border-top: 2px solid #222;
      border-bottom: 2px solid #222;
      margin-bottom: 6px;
      background: #fff8e8;
      overflow: hidden;
    }

    .guide-label {
      float: left;
      width: 120px;
      padding: 6px 0;
      background: #222;
      color: #f7f1e3;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
    }

    .guide-text {
      margin-left: 130px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.35;
    }

    .tips {
      margin-bottom: 6px;
      overflow: hidden;
    }

    .tip {
      float: left;
      width: 32.4%;
      min-height: 54px;
      margin-right: 1.4%;
      padding: 6px;
      border: 1px solid #9d937e;
      background: #fffaf0;
      font-size: 11px;
      line-height: 1.35;
      box-sizing: border-box;
    }

    .tip-last {
      margin-right: 0;
    }
